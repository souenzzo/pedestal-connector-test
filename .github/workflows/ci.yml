on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: 1.12.4.1618
      - uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: cljdeps-${{ hashFiles('deps.edn') }}
      - run: clojure -X:jetty:test
      - run: clojure -X:http-kit:test
